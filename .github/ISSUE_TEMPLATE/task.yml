name: Task
description: A development task for the project backlog.
title: "[Task] "
labels: []
body:
  - type: input
    id: priority
    attributes:
      label: Priority
      description: "Task priority level (P0 / P1 / P2)"
      placeholder: "P0"
    validations:
      required: true

  - type: input
    id: estimate
    attributes:
      label: Estimate (hours)
      description: "Estimated effort in hours"
      placeholder: "20"
    validations:
      required: true

  - type: input
    id: labels
    attributes:
      label: Labels
      description: "Comma-separated label names (e.g. 基础, 战斗)"
      placeholder: "基础"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Description
      description: "What needs to be done?"
      placeholder: "Describe the task in detail."
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: "How do we know this task is done?"
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: false
